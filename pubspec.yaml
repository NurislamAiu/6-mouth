name: mouth6
description: "6MONTH - a 6-month personal transformation tracker."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.6.0
  image_picker: ^1.2.1
  in_app_purchase: ^3.2.3
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.6
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  firebase_core: ^3.15.2
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.3
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
